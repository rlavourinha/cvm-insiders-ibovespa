name: Atualiza dashboard CVM

# Cadência alinhada à publicação do VLMO (informe mensal, entrega até o dia 10):
#  - dias 1–11: todo dia às 13:15 UTC (10:15 de Brasília) p/ captar as entregas novas
#  - após o dia 11: semanal (segundas), só p/ pegar reapresentações/correções
# (a regra semanal também dispara em segundas dos dias 1–11; o run extra é
#  inofensivo — o fetch recebe 304 e nada muda.)
on:
  schedule:
    - cron: '15 13 1-11 * *'
    - cron: '15 13 * * 1'
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instala dependências
        run: pip install -r requirements.txt
      - name: Coleta na CVM e gera o dashboard
        # O portal da CVM fica lento/instável às vezes; retry no nível do build
        # (até 5 tentativas, 120s entre elas) dá tempo de ele voltar.
        run: |
          n=0
          until python dashboard.py; do
            n=$((n+1)); [ $n -ge 5 ] && { echo "::error::CVM indisponível após 5 tentativas"; exit 1; }
            echo "[retry] tentativa $n falhou (CVM provavelmente lenta) — aguardando 120s…"
            sleep 120
          done
      - name: Empacota versão offline (fontes embutidas)
        run: |
          mkdir -p _site
          python make_shareable.py output/dashboard.html _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
