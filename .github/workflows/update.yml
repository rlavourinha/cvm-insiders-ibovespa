name: Atualiza dashboard CVM

# Cadência alinhada à publicação do VLMO (informe mensal, entrega até o dia 10):
#  - dias 1–11: todo dia às 13:15 UTC (10:15 de Brasília) p/ captar as entregas novas
#  - após o dia 11: semanal (segundas), só p/ pegar reapresentações/correções
# (a regra semanal também dispara em segundas dos dias 1–11; o run extra é
#  inofensivo — o fetch recebe 304 e nada muda.)
on:
  schedule:
    - cron: '15 13 1-11 * *'
    - cron: '15 13 * * 1'
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instala dependências
        run: pip install -r requirements.txt
      - name: Gera o dashboard (coleta CVM; cai para snapshot se o runner for bloqueado)
        # A CVM responde normalmente de IPs residenciais, mas bloqueia/limita os
        # IPs de datacenter (Azure) dos runners do GitHub. Tentamos a coleta ao
        # vivo algumas vezes; se falhar, publicamos o snapshot versionado
        # (dashboard_fallback.html), gerado localmente onde a CVM é acessível.
        run: |
          SRC=output/dashboard.html
          n=0
          until python dashboard.py; do
            n=$((n+1))
            if [ $n -ge 3 ]; then
              echo "::warning::CVM inacessível ao runner após $n tentativas — publicando snapshot versionado"
              SRC=dashboard_fallback.html
              break
            fi
            echo "[retry] tentativa $n falhou — aguardando 120s…"
            sleep 120
          done
          mkdir -p _site
          python make_shareable.py "$SRC" _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
